version: '3.8'
services:
  app:
    image: ${DOCKERHUB_USERNAME}/app:latest
    env_file:
      - .env
    environment:
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - TZ=Europe/Paris
    depends_on:
      db:
        condition: service_healthy
    restart: always
    # 512 Mo (était 256) : marge pour les traitements d'image (libvips/sharp) du juge
    # custom-art. À 256 Mo le conteneur était déjà à ~80 % à vide -> dépassement mémoire
    # et segfault natif pendant le jugement (incident 13/06). Couplé à 1 instance PM2.
    mem_limit: 512m
    memswap_limit: 768m

  nginx:
    image: ${DOCKERHUB_USERNAME}/nginx:latest
    environment:
      - TZ=Europe/Paris
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - app
      - mcp-shopify
      - mcp-gmail
    restart: always
    mem_limit: 64m
    memswap_limit: 128m

  certbot:
    image: certbot/certbot
    environment:
      - TZ=Europe/Paris
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: "tail -f /dev/null"
    restart: always
    mem_limit: 32m
    memswap_limit: 64m

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB_NAME}
      MYSQL_INIT_COMMAND: "SET GLOBAL host_cache_size=0"
      TZ: Europe/Paris
    volumes:
      - db-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/zz-tuning.cnf:ro
    ports:
      - '127.0.0.1:3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    mem_limit: 512m
    memswap_limit: 1g

  mcp-shopify:
    image: ${DOCKERHUB_USERNAME}/mcp-shopify:latest
    env_file:
      - .env
    environment:
      - TRANSPORT_MODE=sse
      - PORT=3001
      - TZ=Europe/Paris
    restart: always
    mem_limit: 96m
    memswap_limit: 192m

  mcp-gmail:
    image: ${DOCKERHUB_USERNAME}/mcp-gmail:latest
    env_file:
      - .env
    environment:
      - PORT=3002
      - TZ=Europe/Paris
    restart: always
    mem_limit: 96m
    memswap_limit: 192m

volumes:
  db-data:
