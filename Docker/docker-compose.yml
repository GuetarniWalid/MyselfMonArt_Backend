version: '3.8'
services:

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB_NAME}
    volumes:  
      - db-data:/var/lib/mysql

  app:
    build:
      context: ../
      dockerfile: Docker/node/Dockerfile
    env_file:
      - .env
    ports:
      - '${PORT}:${PORT}'
    depends_on:
      - db

  nginx:
    build:
      context: ../
      dockerfile: Docker/nginx/Dockerfile
    ports:
      - '80:80'

volumes:
  db-data: