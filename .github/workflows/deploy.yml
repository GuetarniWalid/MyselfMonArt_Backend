name: Deploy to DigitalOcean with Docker

on:
  push:
    branches:
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Transfer the .env file to the right place
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          script: |
            mkdir -p /opt/dashboard_myselfmonart
            cp /opt/env/.env /opt/dashboard_myselfmonart

      - name: Deploy the app, nginx and database
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          script: |
            apt-get update
            apt-get install docker-compose -y
            cd /opt/dashboard_myselfmonart
            docker-compose pull
            docker-compose up -d
