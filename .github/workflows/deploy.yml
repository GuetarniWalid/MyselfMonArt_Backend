name: Deploy to DigitalOcean with Docker

on:
  push:
    branches:
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Transfer docker-compose.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          source: "./Docker/docker-compose.yml"
          target: "/opt/dashboard_myselfmonart/docker-compose.yml"

      - name: Deploy the app, nginx and database
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          script: |
            apt-get update
            apt-get install docker-compose -y
            cd /opt/dashboard_myselfmonart
            docker-compose pull
            docker-compose up -d
