name: Deploy to DigitalOcean with Docker

# Deploys to production server on push to specified branches
# WARNING: All branches deploy to the SAME production environment
on:
  push:
    branches:
      - main
      - test
      - feature/automated-mockup-generation  # Testing automated mockup feature in production

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install app dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Copy docker-compose.yml to build directory
        run: cp Docker/docker-compose.yml build/docker-compose.yml

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker images for app
        run: |
          docker build -f Docker/node/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/app:latest
        working-directory: .

      - name: Build and push Docker images for nginx
        run: |
          docker build -f Docker/nginx/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/nginx:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/nginx:latest

      - name: Build and push Docker images for MCP Shopify
        run: |
          docker build -f mcp/shopify/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/mcp-shopify:latest mcp/shopify
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mcp-shopify:latest

      - name: Build and push Docker images for MCP Gmail
        run: |
          docker build -f mcp/gmail/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/mcp-gmail:latest mcp/gmail
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mcp-gmail:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Transfer docker-compose.yml and mysql tuning to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          source: "./Docker/docker-compose.yml,./Docker/mysql/my.cnf"
          target: "/opt/MyselfMonArt_Dashboard"

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          script: |
            set -e
            mv /opt/MyselfMonArt_Dashboard/Docker/docker-compose.yml /opt/MyselfMonArt_Dashboard/docker-compose.yml
            mkdir -p /opt/MyselfMonArt_Dashboard/mysql
            mv /opt/MyselfMonArt_Dashboard/Docker/mysql/my.cnf /opt/MyselfMonArt_Dashboard/mysql/my.cnf
            rm -rf /opt/MyselfMonArt_Dashboard/Docker
            # Install docker compose v2 if missing (v1 Python is broken with Docker 28+)
            if ! docker compose version >/dev/null 2>&1; then
              apt-get update
              apt-get install -y docker-compose-v2
            fi
            cd /opt/MyselfMonArt_Dashboard
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export DIGITALOCEAN_HOST="${{ secrets.DIGITALOCEAN_HOST }}"
            docker compose pull
            docker compose up -d --remove-orphans
            sleep 10
            # Bail out early if anything is unhealthy — protects the next (image) prune
            if [ "$(docker compose ps --status running --services | wc -l)" -lt 6 ]; then
              echo "Some services are not running after up -d — aborting before prune"
              docker compose ps
              docker compose logs --tail=200
              exit 1
            fi
            # Initial certificate setup if needed
            docker compose exec -T certbot certbot certonly --webroot \
              --webroot-path=/var/www/certbot \
              --agree-tos \
              --no-eff-email \
              --non-interactive \
              -d backend.myselfmonart.com || true
            # Verify certificate exists
            docker compose exec -T certbot certbot certificates | grep "Certificate Name: backend.myselfmonart.com" || {
              echo "Certificate setup failed"
              docker compose logs certbot
              exit 1
            }
            if ! docker compose exec -T app node ace migration:run; then
              echo "Migration failed"
              docker compose logs app
              exit 1
            fi
            if ! docker compose exec -T app node ace db:seed; then
              echo "Seeding failed"
              docker compose logs app
              exit 1
            fi
            # Prune images only — NEVER --volumes (would wipe db-data if a container is down)
            docker image prune -af || true
            set +e
            docker compose exec -T certbot certbot renew --webroot \
              --webroot-path=/var/www/certbot \
              --agree-tos \
              --no-eff-email \
              -d backend.myselfmonart.com || \
            docker compose exec -T certbot certbot certonly --webroot \
              --webroot-path=/var/www/certbot \
              --agree-tos \
              --no-eff-email \
              -d backend.myselfmonart.com
            docker compose ps
            docker compose logs --tail=100
            echo "Checking certbot status:"
            docker compose ps certbot
            echo "Certbot logs:"
            docker compose logs certbot
